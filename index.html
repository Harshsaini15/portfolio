<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harsh Saini — Portfolio</title>
    <!--
      This file is only for GitHub Pages when the site source is wrongly set to "repo root".
      It must not load .tsx (wrong MIME type on Pages). The real app lives in ./docs/ from CI.
      Local dev uses app/index.html via Vite (see vite.config.ts root).
    -->
    <script>
      ;(function () {
        var h = location.hostname
        if (h === 'localhost' || h === '127.0.0.1') return
        if (/\/docs(\/|$)/.test(location.pathname)) return
        if (!/\.github\.io$/i.test(h)) return
        var segs = location.pathname.replace(/\/$/, '').split('/').filter(Boolean)
        var path = segs.length ? '/' + segs[0] + '/docs/' : '/docs/'
        location.replace(location.origin + path + location.search + location.hash)
      })()
    </script>
    <meta http-equiv="refresh" content="0;url=./docs/" />
  </head>
  <body>
    <p><a href="./docs/">Open the portfolio</a></p>
  </body>
</html>
