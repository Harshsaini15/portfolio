# Builds the site and commits the output to ./docs on the same branch.
#
# GitHub Pages (one-time):
#   Settings → Pages → Build and deployment → Source: Deploy from a branch
#   Branch: main (or master)  →  Folder: /docs
#
# Publishing "main" + / (root) serves the dev index.html (/src/main.tsx) and
# will always show a blank page. The live site must come from ./docs (this workflow).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-docs-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Vite base path for GitHub Pages
        id: vite_base
        shell: bash
        run: |
          repo="${{ github.event.repository.name }}"
          owner="${{ github.repository_owner }}"
          if [[ "$repo" == "$owner.github.io" ]]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/$repo/" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci

      - run: npm run build
        env:
          VITE_BASE: ${{ steps.vite_base.outputs.base }}

      - name: Verify production bundle (not dev index.html)
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "::error::dist/index.html still references dev entry — build did not produce a production bundle"
            exit 1
          fi

      - name: Publish build to docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf docs
          cp -R dist docs
          git add docs
          if git diff --staged --quiet; then
            echo "No changes under docs/ — skipping commit"
            exit 0
          fi
          git commit -m "chore: publish site to docs"
          git push
