# Builds the site and pushes ./dist to the gh-pages branch.
#
# GitHub Pages setup (one-time):
#   Settings → Pages → Build and deployment → Source: Deploy from a branch
#   Branch: gh-pages  /  Folder: / (root)
#
# Do NOT use "main" + / (root) as the Pages source — that publishes this repo's
# source index.html (with /src/main.tsx) and causes a blank page.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Vite base path for GitHub Pages
        id: vite_base
        shell: bash
        run: |
          repo="${{ github.event.repository.name }}"
          owner="${{ github.repository_owner }}"
          if [[ "$repo" == "$owner.github.io" ]]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/$repo/" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci

      - run: npm run build
        env:
          VITE_BASE: ${{ steps.vite_base.outputs.base }}

      - name: Verify production bundle (not dev index.html)
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "::error::dist/index.html still references dev entry — build did not produce a production bundle"
            exit 1
          fi

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
